apiVersion: apps/v1
kind: StatefulSet
metadata:
  # Ejercicio 5:
  # Se usa StatefulSet con fin didactico para comparar con Deployment.
  # Nota tecnica: una API stateless como esta, en un caso real, suele modelarse como Deployment.
  name: backend-java
  namespace: apps
spec:
  serviceName: backend-java-headless
  replicas: 1
  selector:
    matchLabels:
      app: backend-java
  template:
    metadata:
      labels:
        app: backend-java
    spec:
      containers:
        - name: backend-java
          image: backend-java:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
